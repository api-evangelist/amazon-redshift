specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Amazon Redshift
providerId: amazon-redshift
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Rate Limiting
  - AWS
  - Data Warehouse
  - Redshift
description: Amazon Redshift exposes three API surfaces - the Redshift control-plane (CreateCluster, DescribeClusters),
  the Redshift Data API (ExecuteStatement, GetStatementResult), and the Serverless control-plane. All
  follow standard AWS API throttling per account/region. Cluster-level concurrent connection limits and
  query-queue concurrency are enforced at the database level. Use exponential backoff with jitter on
  ThrottlingException.
sources:
  - https://docs.aws.amazon.com/redshift/latest/mgmt/amazon-redshift-limits.html
  - https://docs.aws.amazon.com/redshift-data/latest/APIReference/Welcome.html
  - https://docs.aws.amazon.com/general/latest/gr/api-retries.html
headers:
  requestId: x-amzn-RequestId
  retryAfter: Retry-After
responseCodes:
  throttled: 400
  quotaExceeded: 400
  serviceUnavailable: 503
limits:
  - name: Redshift control-plane API
    scope: account/region
    metric: varies
    limit: see Service Quotas console for Redshift
    notes: Standard AWS API throttling envelope on management calls.
  - name: Redshift Data API
    scope: account/region
    metric: varies
    limit: see Redshift Data API quotas
    notes: ExecuteStatement, BatchExecuteStatement, ListStatements, etc. are throttled per account/region.
  - name: Concurrent database connections
    scope: cluster
    metric: concurrent_connections
    limit: 500
    notes: Default per provisioned cluster; configurable, raisable via support.
  - name: Concurrent queries (default WLM)
    scope: cluster
    metric: concurrent_queries
    limit: 50
    notes: Cluster-wide concurrency cap across WLM queues; tune via WLM configuration.
  - name: Query queue slots per WLM queue
    scope: queue
    metric: concurrent_queries
    limit: 50
    notes: Maximum total slots across queues is 50.
policies:
  - name: Backoff with jitter
    description: AWS SDKs default to standard retry mode (truncated exponential backoff with jitter, max
      20s, 3 attempts).
  - name: Workload management
    description: Configure WLM (manual or auto) and short-query acceleration to spread query concurrency;
      use Concurrency Scaling to absorb bursts on Provisioned.
  - name: Serverless auto-scaling
    description: Redshift Serverless absorbs concurrency by adjusting RPU capacity; bills are still subject
      to RPU-hour rate.
  - name: Quota increases
    description: Cluster, snapshot, and IAM-role limits are soft and raisable via Service Quotas.
maintainers:
  - name: Kin Lane
    email: kin@apievangelist.com
    url: https://apievangelist.com
  - name: Amazon Web Services
    email: support@aws.amazon.com
    url: https://aws.amazon.com
