description: 'FOCUS-aligned FinOps for Amazon Redshift: per-RPU-hour Serverless billing, per-node-hour
  Provisioned billing on RA3, Redshift Managed Storage at $0.024/GB-month, plus Concurrency Scaling overage,
  Reserved Instances, and Savings Plans.'
sources:
  - https://aws.amazon.com/redshift/pricing/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Amazon Web Services, Inc.
serviceCategory: Analytics / Data Warehouse
billingModel:
  pricingCategory: Pay-As-You-Go + Committed Use
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
focusColumns:
  ServiceName: Amazon Redshift
  ServiceCategory: Analytics
  ServiceSubcategory: Data Warehouse
  ProviderName: AWS
  PublisherName: Amazon Web Services, Inc.
  InvoiceIssuerName: Amazon Web Services, Inc.
  BillingCurrency: USD
