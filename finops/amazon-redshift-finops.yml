meters:
  - name: rpu_hours
    unit: RPU-hour
    aggregation: sum
    dimensions:
      - region
      - workgroup
      - namespace
  - name: node_hours
    unit: node-hour
    aggregation: sum
    dimensions:
      - region
      - cluster
      - node_type
  - name: managed_storage_gb_month
    unit: GB-month
    aggregation: sum
    dimensions:
      - region
      - cluster_or_namespace
  - name: concurrency_scaling_seconds
    unit: cs-second
    aggregation: sum
    dimensions:
      - region
      - cluster
  - name: backup_storage_gb_month
    unit: GB-month
    aggregation: sum
    dimensions:
      - region
      - cluster_or_namespace
  - name: data_transfer_gb
    unit: GB
    aggregation: sum
    dimensions:
      - region
      - direction
principles:
  - name: Visibility
    description: Use Cost Explorer with the Redshift dimension, the Redshift console's Performance and
      Concurrency Scaling reports, system tables (STL_QUERY, SVL_QUERY_METRICS), and CUR / FOCUS export.
  - name: Allocation
    description: Tag clusters/workgroups/namespaces with Environment, Team, Use Case; enable cost allocation
      tags so charges flow into FOCUS columns.
  - name: Optimization
    description: Pause/scale-down Provisioned clusters, choose Serverless for spiky workloads, commit to
      Reserved Instances for steady production, monitor RA3 storage growth, use Concurrency Scaling free-hour
      credits before paying overage, and use Materialized Views and Auto-Vacuum to reduce query cost.
  - name: Accountability
    description: Set AWS Budgets per cluster tag, alert on Concurrency Scaling overage, and review monthly
      RPU-hour utilization for Serverless workgroup right-sizing.
