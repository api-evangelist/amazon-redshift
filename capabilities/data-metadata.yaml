naftiko: 1.0.0-alpha2
info:
  label: Amazon Redshift Data API — Metadata
  description: 'Amazon Redshift Data API — Metadata. 4 operations. Lead operation: Amazon Redshift Describe the Columns of
    a Table. Self-contained Naftiko capability covering one Amazon Redshift business surface.'
  tags:
  - Amazon Redshift
  - Metadata
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_REDSHIFT_API_KEY: AMAZON_REDSHIFT_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-metadata
    baseUri: https://redshift-data.{region}.amazonaws.com
    description: Amazon Redshift Data API — Metadata business capability. Self-contained, no shared references.
    resources:
    - name: DescribeTable
      path: /DescribeTable
      operations:
      - name: describetable
        method: POST
        description: Amazon Redshift Describe the Columns of a Table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: ListDatabases
      path: /ListDatabases
      operations:
      - name: listdatabases
        method: POST
        description: Amazon Redshift List Databases in a Cluster or Workgroup
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: ListSchemas
      path: /ListSchemas
      operations:
      - name: listschemas
        method: POST
        description: Amazon Redshift List Schemas in a Database
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: ListTables
      path: /ListTables
      operations:
      - name: listtables
        method: POST
        description: Amazon Redshift List Tables in a Schema
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.AMAZON_REDSHIFT_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: data-metadata-rest
    port: 8080
    description: REST adapter for Amazon Redshift Data API — Metadata. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/describetable
      name: describetable
      description: REST surface for DescribeTable.
      operations:
      - method: POST
        name: describetable
        description: Amazon Redshift Describe the Columns of a Table
        call: data-metadata.describetable
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/listdatabases
      name: listdatabases
      description: REST surface for ListDatabases.
      operations:
      - method: POST
        name: listdatabases
        description: Amazon Redshift List Databases in a Cluster or Workgroup
        call: data-metadata.listdatabases
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/listschemas
      name: listschemas
      description: REST surface for ListSchemas.
      operations:
      - method: POST
        name: listschemas
        description: Amazon Redshift List Schemas in a Database
        call: data-metadata.listschemas
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/listtables
      name: listtables
      description: REST surface for ListTables.
      operations:
      - method: POST
        name: listtables
        description: Amazon Redshift List Tables in a Schema
        call: data-metadata.listtables
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: data-metadata-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Redshift Data API — Metadata. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-redshift-describe-columns-table
      description: Amazon Redshift Describe the Columns of a Table
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: data-metadata.describetable
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-redshift-list-databases-cluster
      description: Amazon Redshift List Databases in a Cluster or Workgroup
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: data-metadata.listdatabases
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-redshift-list-schemas-database
      description: Amazon Redshift List Schemas in a Database
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: data-metadata.listschemas
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-redshift-list-tables-schema
      description: Amazon Redshift List Tables in a Schema
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: data-metadata.listtables
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
