naftiko: "1.0.0-alpha1"

info:
  label: "Amazon Redshift Data API"
  description: "Amazon Redshift Data API for executing SQL statements, managing statement lifecycle, and retrieving database metadata without managing connections."
  tags:
    - Amazon
    - AWS
    - Data Warehouse
    - SQL
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION

capability:
  consumes:
    - type: http
      namespace: redshift-data
      baseUri: https://redshift-data.us-east-1.amazonaws.com
      description: "Amazon Redshift Data API for connectionless SQL execution"
      authentication:
        type: apikey
        key: Authorization
        value: "{{AWS_ACCESS_KEY_ID}}"
        placement: header
      resources:
        - name: statements
          path: /
          description: "SQL statement execution and management"
          operations:
            - name: execute-statement
              method: POST
              description: "Execute a SQL statement asynchronously"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  Sql: "{{tools.sql}}"
                  Database: "{{tools.database}}"
            - name: batch-execute-statement
              method: POST
              description: "Execute multiple SQL statements in a batch transaction"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: describe-statement
              method: POST
              description: "Get details about a SQL statement execution"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-statements
              method: POST
              description: "List SQL statement executions"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: cancel-statement
              method: POST
              description: "Cancel a running SQL statement"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-statement-result
              method: POST
              description: "Retrieve results from a completed SQL statement"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: metadata
          path: /
          description: "Database metadata operations"
          operations:
            - name: list-databases
              method: POST
              description: "List databases in a Redshift cluster or workgroup"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-schemas
              method: POST
              description: "List schemas in a database"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-tables
              method: POST
              description: "List tables in a schema"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: describe-table
              method: POST
              description: "Describe the columns of a table"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: redshift-data-api
      resources:
        - path: /v1/statements
          name: statements
          description: "SQL statement management"
          operations:
            - method: POST
              name: execute-statement
              description: "Execute a SQL statement"
              call: "redshift-data.execute-statement"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: GET
              name: list-statements
              description: "List SQL statements"
              call: "redshift-data.list-statements"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: redshift-data-mcp
      transport: http
      tools:
        - name: execute-statement
          description: "Execute a SQL statement asynchronously"
          hints:
            readOnly: false
          call: "redshift-data.execute-statement"
          with:
            sql: "tools.sql"
            database: "tools.database"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-statements
          description: "List SQL statement executions"
          hints:
            readOnly: true
          call: "redshift-data.list-statements"
          outputParameters:
            - type: object
              mapping: "$."
        - name: describe-statement
          description: "Get details about a statement execution"
          hints:
            readOnly: true
          call: "redshift-data.describe-statement"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-statement-result
          description: "Retrieve results from a completed statement"
          hints:
            readOnly: true
          call: "redshift-data.get-statement-result"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-databases
          description: "List databases in a cluster"
          hints:
            readOnly: true
          call: "redshift-data.list-databases"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-tables
          description: "List tables in a schema"
          hints:
            readOnly: true
          call: "redshift-data.list-tables"
          outputParameters:
            - type: object
              mapping: "$."
