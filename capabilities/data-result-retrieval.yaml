naftiko: 1.0.0-alpha2
info:
  label: Amazon Redshift Data API — Result Retrieval
  description: 'Amazon Redshift Data API — Result Retrieval. 1 operations. Lead operation: Amazon Redshift Get the Results
    of a Sql Statement. Self-contained Naftiko capability covering one Amazon Redshift business surface.'
  tags:
  - Amazon Redshift
  - Result Retrieval
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_REDSHIFT_API_KEY: AMAZON_REDSHIFT_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-result-retrieval
    baseUri: https://redshift-data.{region}.amazonaws.com
    description: Amazon Redshift Data API — Result Retrieval business capability. Self-contained, no shared references.
    resources:
    - name: GetStatementResult
      path: /GetStatementResult
      operations:
      - name: getstatementresult
        method: POST
        description: Amazon Redshift Get the Results of a Sql Statement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.AMAZON_REDSHIFT_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: data-result-retrieval-rest
    port: 8080
    description: REST adapter for Amazon Redshift Data API — Result Retrieval. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/getstatementresult
      name: getstatementresult
      description: REST surface for GetStatementResult.
      operations:
      - method: POST
        name: getstatementresult
        description: Amazon Redshift Get the Results of a Sql Statement
        call: data-result-retrieval.getstatementresult
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: data-result-retrieval-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Redshift Data API — Result Retrieval. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-redshift-get-results-sql
      description: Amazon Redshift Get the Results of a Sql Statement
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: data-result-retrieval.getstatementresult
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
